version: '3.8'

services:
  # 1. LA BASE DE DATOS (Tu nuevo "XAMPP" en Docker)
  db-asistencia:
    image: mysql:8.0 
    container_name: bd_asistencia
    restart: always
    environment:
      MYSQL_DATABASE: asistencia       # <-- Coincide con tu properties
      MYSQL_USER: appuser           # <-- Creamos tu usuario específico
      MYSQL_PASSWORD: root # <-- Tu contraseña exacta
      MYSQL_ROOT_PASSWORD: rootpassword        # (MySQL siempre pide una clave root por seguridad)
    expose:
      - "3306"
    volumes:
      - ./base-de-datos:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal-asistencias
  # 2. TU BACKEND (Spring Boot)
  backend-asistencia:
    build: ./backend-asistencia # (Recuerda poner el nombre real de tu carpeta de Java aquí)
    restart: unless-stopped
    depends_on:
      db-asistencia:
        condition: service_healthy
    container_name: backend_asistencia
    expose:
      - "8080"
    environment:
      # Docker sobreescribirá tu application.properties mágicamente con esto:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-asistencia:3306/asistencia?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - internal-asistencias
    volumes:
      - backend_data:/app/data
  # 3. TU FRONTEND (React)
  frontend-asistencia:
    build: ./frontend-asistencia # (Recuerda poner el nombre real de tu carpeta de React aquí)
    restart: unless-stopped
    container_name: frontend_asistencia
    ports:
      - "3003:80"
    volumes:
      - ./frontend-asistencia:/app/
      - /app/node_modules
    depends_on:
      - backend-asistencia
    networks:
      - internal-asistencias

volumes:
  backend_data:

networks:
  internal-asistencias:
    driver: bridge