spring.application.name=asistencia
# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# ===============================
# Cambia 'asistencia_db' por el nombre de tu base de datos si es diferente
spring.datasource.url=jdbc:mysql://localhost:3306/asistencia?createDatabaseIfNotExist=true
spring.datasource.username=asistencia
# Reemplaza esto con la contraseńa de tu base de datos local
spring.datasource.password=1002965447Jc

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# 'update' le dice a Spring que cree o actualice las tablas de la BD automáticamente según tus clases Java
spring.jpa.hibernate.ddl-auto=update

# 'true' te permite ver en la consola las consultas SQL que Spring está ejecutando (muy útil para aprender y debugear)
spring.jpa.show-sql=true
